<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>369 Mission Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0C1F16;
  --bg2:#0F2419;
  --green:#1D7A45;
  --green2:#22c55e;
  --red:#C0392B;
  --cream:#E8DEB8;
  --cream2:#B8AE90;
  --bd:rgba(29,122,69,.2);
  --font-display:'Barlow Condensed',sans-serif;
  --font-mono:'Courier Prime',monospace;
}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--cream);
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:var(--font-mono);
}
.wrap{
  width:min(340px,92vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 0 40px;text-align:center;
  opacity:0;
  animation:up .6s ease .1s forwards;
}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Top status bar */
.status-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  margin-bottom:60px;
  padding-bottom:12px;
  border-bottom:1px solid var(--bd);
}
.live{
  display:flex;align-items:center;gap:6px;
  font-size:9px;letter-spacing:.2em;color:var(--green2);
  text-transform:uppercase;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--green2);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.version{
  font-size:9px;letter-spacing:.15em;
  color:rgba(232,222,184,.3);
}

/* 369 — bold condensed green blinking */
.num{
  font-family:var(--font-display);
  font-size:88px;
  font-weight:800;
  color:var(--green2);
  letter-spacing:-.03em;
  line-height:.9;
  margin-bottom:4px;
  animation:greenblink 2.5s ease-in-out infinite;
}
@keyframes greenblink{0%,100%{opacity:1}50%{opacity:.4}}

/* Mission Vault — big bold condensed red */
.title{
  font-family:var(--font-display);
  font-size:52px;
  font-weight:800;
  color:var(--red);
  letter-spacing:-.01em;
  line-height:.95;
  text-transform:uppercase;
  margin-bottom:24px;
  animation:redpulse 3.5s ease-in-out infinite;
}
@keyframes redpulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Horizontal rule -->*/
.rule{
  width:100%;
  height:1px;
  background:var(--bd);
  margin-bottom:20px;
}

/* Label */
.label{
  width:100%;
  font-size:8px;
  letter-spacing:.25em;
  color:rgba(232,222,184,.35);
  text-transform:uppercase;
  margin-bottom:16px;
  text-align:center;
}

/* Links */
.link{
  display:flex;align-items:center;gap:10px;
  width:100%;
  padding:12px 0;
  background:none;border:none;
  font-family:var(--font-mono);
  font-size:13px;
  color:var(--cream2);
  cursor:pointer;
  letter-spacing:.04em;
  border-bottom:1px solid var(--bd);
  text-align:center;justify-content:center;
  transition:color .15s;
}
.link:hover{color:var(--cream);}
.link:first-of-type{margin-top:0}
.link svg{flex-shrink:0}
.arr{
  margin-left:auto;
  font-size:12px;
  color:rgba(232,222,184,.2);
  transition:transform .15s,color .15s;
}
.link:hover .arr{
  transform:translateX(4px);
  color:var(--green2);
}

/* Footer */
.foot{
  margin-top:40px;
  font-size:8px;
  letter-spacing:.15em;
  color:rgba(232,222,184,.2);
  text-transform:uppercase;
  text-align:center;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="status-bar">
    <div class="live">
      <div class="dot"></div>
      System online
    </div>
    <div class="version">v3.0 · Mac Mini M4</div>
  </div>

  <div class="num">369</div>
  <div class="title">Mission<br>Vault</div>

  <div class="rule"></div>
  <div class="label">Sign in to access</div>

  <button class="link" onclick="loginWithGoogle()">
    <svg width="14" height="14" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
    <span class="arr">→</span>
  </button>

  <button class="link" onclick="loginWithApple()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="#E8DEB8">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
    </svg>
    Continue with Apple
    <span class="arr">→</span>
  </button>

  <div class="foot">Three Sixty Nine GmbH · Authorised access only</div>

</div>
<script>
async function loginWithGoogle(){
  try{
    const r=await fetch('/api/gmail/auth-start?mode=login').then(x=>x.json());
    if(r.error){alert('Error: '+r.error);return;}
    const w=500,h=650,l=Math.round(screen.width/2-w/2),t=Math.round(screen.height/2-h/2);
    const popup=window.open(r.authUrl,'mv-login',`width=${w},height=${h},left=${l},top=${t},scrollbars=yes`);
    const timer=setInterval(()=>{if(popup.closed){clearInterval(timer);window.location.href='/';}},1000);
    window.addEventListener('message',e=>{
      if(e.data?.type==='gmail-connected'){clearInterval(timer);window.location.href='/';}
    });
  }catch(e){alert('Could not connect: '+e.message);}
}
function loginWithApple(){alert('Apple Sign-In coming soon.');}
</script>
</body>
</html>
